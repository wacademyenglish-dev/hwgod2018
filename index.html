<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mimir's Tales (Homework)</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ws: {
                            bg: '#050a05',
                            panel: 'rgba(10, 15, 10, 0.95)',
                            norseGreen: '#15803d',
                            spartanRed: '#dc2626',
                            gold: '#d97706'
                        }
                    },
                    fontFamily: {
                        epic: ['Cinzel', 'serif'],
                        base: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #050a05;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at top, rgba(21, 128, 61, 0.1) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/black-scales.png");
        }

        /* Mobile Container Simulation */
        #mobile-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background-color: #050a05;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(21, 128, 61, 0.2);
            border: 2px solid #15803d;
            border-radius: 4px;
        }

        @media (max-width: 400px) {
            #mobile-container { border: none; box-shadow: none; height: 100vh; max-height: none; border-radius: 0; }
        }

        .btn-option {
            background: linear-gradient(to right, rgba(10, 15, 10, 0.9), rgba(5, 10, 5, 0.9)); 
            border: 1px solid #14532d;
            color: #f8fafc;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1.25rem 1rem;
            border-radius: 4px;
            width: 100%;
            text-align: center;
            transition: all 0.2s;
            position: relative;
            margin-bottom: 0.75rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            letter-spacing: 0.1em;
        }
        .btn-option:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .btn-option:hover:not(.disabled) { border-color: #15803d; }
        .btn-option.correct { background: linear-gradient(to right, #166534, #14532d); border-color: #4ade80; color: #fff; box-shadow: 0 0 15px rgba(21, 128, 61, 0.5); }
        .btn-option.wrong { background: linear-gradient(to right, #991b1b, #7f1d1d); border-color: #dc2626; color: #fca5a5; box-shadow: 0 0 15px rgba(220, 38, 38, 0.5); }
        .btn-option.disabled { pointer-events: none; opacity: 0.7; }

        .fade-in { animation: fadeIn 0.3s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Praise Toast */
        .praise-toast {
            position: absolute; top: 15%; left: 50%; transform: translate(-50%, 0);
            background: #d97706; color: #000; border: 2px solid #d97706;
            font-family: 'Cinzel', serif; font-weight: bold;
            padding: 0.5rem 1rem; text-transform: uppercase; letter-spacing: 0.1em;
            box-shadow: 0 0 20px rgba(217, 119, 6, 0.6);
            opacity: 0; pointer-events: none; z-index: 101; text-align: center;
            border-radius: 2px;
        }
        .toast-anim { animation: toastUp 1.5s ease-out forwards; }
        @keyframes toastUp {
            0% { transform: translate(-50%, 20px) scale(0.8); opacity: 0; }
            20% { transform: translate(-50%, 0) scale(1.1); opacity: 1; }
            80% { transform: translate(-50%, 0) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -20px) scale(0.8); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="mobile-container">
        
        <!-- HEADER -->
        <header class="bg-black/90 backdrop-blur-md border-b border-gray-800 p-4 flex justify-between items-center z-10 shrink-0 shadow-lg">
            <div class="flex items-center gap-3">
                <span class="text-2xl drop-shadow-[0_0_5px_#15803d]">📜</span>
                <div class="flex flex-col">
                    <span class="text-[9px] text-gray-400 font-epic tracking-widest uppercase font-bold">Mimir's Tales</span>
                    <span class="text-white font-base text-xs font-bold tracking-widest uppercase drop-shadow-md">Knowledge Test</span>
                </div>
            </div>
            <span class="text-ws-norseGreen font-epic font-bold text-[10px] border border-ws-norseGreen px-2 py-0.5 rounded bg-green-900/20">B1</span>
        </header>

        <!-- START SCREEN -->
        <div id="start-screen" class="flex-1 flex flex-col items-center justify-center p-6 text-center z-10 bg-gradient-to-br from-[#050a05] to-[#1a0505]">
            <img src="https://upload.wikimedia.org/wikipedia/en/a/a7/God_of_War_4_cover.jpg" alt="GOW Cover" class="w-full max-w-[200px] object-cover drop-shadow-[0_0_15px_rgba(21,128,61,0.4)] mb-8 border border-ws-norseGreen rounded-sm">
            <h1 class="text-3xl font-epic font-bold text-white uppercase tracking-widest mb-2 drop-shadow-[0_0_10px_rgba(21,128,61,0.3)]">The Old Ways</h1>
            <p class="text-gray-400 font-base text-sm mb-10">Pass the 15-question trial about "Used To" to complete the story.</p>
            <button onclick="startQuiz()" class="w-full bg-gradient-to-r from-ws-norseGreen to-green-900 text-white font-epic font-bold text-lg py-4 uppercase tracking-widest transition-transform hover:scale-105 shadow-[0_0_20px_rgba(21,128,61,0.3)] rounded-sm border-none">Listen to Mimir</button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden flex-1 flex flex-col p-6 z-10 overflow-y-auto">
            <div class="flex justify-between items-center mb-6 border-b border-gray-800 pb-2">
                <span class="font-epic text-xs text-gray-500 uppercase tracking-widest font-bold">Tale <span id="q-num" class="text-ws-norseGreen">1</span>/15</span>
                <span class="font-epic text-xs text-gray-500 uppercase tracking-widest font-bold">Wisdom: <span id="score-text" class="text-ws-gold">0</span></span>
            </div>

            <div id="question-container" class="flex-1 flex flex-col fade-in justify-center mb-8">
                <p class="text-[10px] text-ws-norseGreen uppercase tracking-widest mb-3 font-bold font-epic text-center border border-ws-norseGreen/30 rounded py-1 bg-green-900/20">Fill the blanks</p>
                <p id="q-text" class="text-2xl font-bold text-white mb-8 leading-relaxed font-base text-center"></p>
                
                <div id="options-container" class="flex flex-col gap-3">
                    <!-- Options injected via JS -->
                </div>
            </div>

            <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-auto bg-black text-white border border-gray-600 font-epic font-bold text-base py-4 uppercase tracking-widest shadow-[0_0_15px_rgba(255,255,255,0.1)] hover:border-white transition-colors rounded">Next Tale ▸</button>
        </div>

        <!-- END SCREEN -->
        <div id="end-screen" class="hidden flex-1 flex flex-col items-center justify-center p-6 text-center z-10 bg-[url('https://www.transparenttextures.com/patterns/black-scales.png')] bg-black">
            <span class="text-7xl mb-6 drop-shadow-[0_0_20px_rgba(217,119,6,0.6)]">👁️</span>
            <h1 class="text-3xl font-epic font-bold text-white uppercase tracking-widest mb-2 text-ws-gold">Wisdom Gained</h1>
            <p class="text-gray-400 font-base text-sm font-bold mb-6">Final Wisdom Score:</p>
            <div class="text-5xl font-epic font-bold text-white mb-10 border border-ws-gold bg-yellow-900/20 p-6 shadow-[0_0_30px_rgba(217,119,6,0.3)] rounded">
                <span id="final-score">0</span><span class="text-2xl text-gray-500">/15</span>
            </div>
            <button onclick="location.reload()" class="w-full bg-black border border-gray-700 text-gray-400 font-epic font-bold text-sm py-4 uppercase tracking-widest hover:border-white hover:text-white transition-colors rounded">End Story</button>
        </div>

        <!-- PRAISE TOAST -->
        <div id="praise-toast" class="praise-toast">TALE COMPLETE</div>

        <!-- BOTTOM PROGRESS BAR -->
        <div class="h-1.5 w-full bg-gray-900 shrink-0 border-t border-gray-800">
            <div id="progress-bar" class="h-full bg-gradient-to-r from-ws-norseGreen to-ws-gold w-0 transition-all duration-300 shadow-[0_0_10px_#d97706]"></div>
        </div>

    </div>

    <script>
        const questions = [
            { q: "Kratos ________ be a cruel monster in Greece.", options: ["used to", "use to"], answer: 0 },
            { q: "He didn't ________ have a beard when he was younger.", options: ["use to", "used to"], answer: 0 },
            { q: "I ________ believe in destiny, but now I don't.", options: ["use to", "used to"], answer: 1 },
            { q: "She ________ talk to me, but she doesn't anymore.", options: ["didn't use to", "didn't used to"], answer: 0 },
            { q: "________ you use to live in Sparta?", options: ["Did", "Do"], answer: 0 },
            { q: "They ________ fight gods all the time.", options: ["used to", "using to"], answer: 0 },
            { q: "He ________ get angry easily, but he is calmer now.", options: ["used to", "use to"], answer: 0 },
            { q: "We ________ have a quiet life before the strangers arrived.", options: ["used to", "use to"], answer: 0 },
            { q: "Did Kratos ________ have the Blades of Chaos?", options: ["use to", "used to"], answer: 0 },
            { q: "I ________ think monsters were real.", options: ["used to", "use to"], answer: 0 },
            { q: "He ________ care about his past.", options: ["didn't use to", "didn't used to"], answer: 0 },
            { q: "Where did you ________ hide your weapons?", options: ["use to", "used to"], answer: 0 },
            { q: "The boy ________ know the truth about his father.", options: ["didn't use to", "wasn't use to"], answer: 0 },
            { q: "We ________ go hunting in these woods every day.", options: ["used to", "use to"], answer: 0 },
            { q: "Did they ________ rule the Norse realms?", options: ["use to", "used to"], answer: 0 }
        ];

        let currentQ = 0;
        let score = 0;

        const praises = ["TALE COMPLETE", "TRUE WISDOM", "CORRECT", "MIMIR APPROVES"];

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            document.getElementById('quiz-screen').classList.add('flex');
            loadQuestion();
        }

        function loadQuestion() {
            const qData = questions[currentQ];
            document.getElementById('q-num').innerText = currentQ + 1;
            document.getElementById('q-text').innerHTML = `"${qData.q}"`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerHTML = `<span class="text-ws-gold mr-2">></span> ${opt}`;
                btn.onclick = () => checkAnswer(btn, index);
                container.appendChild(btn);
            });

            document.getElementById('next-btn').classList.add('hidden');
            
            const qContainer = document.getElementById('question-container');
            qContainer.classList.remove('fade-in');
            void qContainer.offsetWidth;
            qContainer.classList.add('fade-in');

            updateProgress();
        }

        function checkAnswer(btn, selectedIndex) {
            const qData = questions[currentQ];
            const allBtns = document.querySelectorAll('.btn-option');
            
            allBtns.forEach(b => b.classList.add('disabled'));

            if (selectedIndex === qData.answer) {
                btn.classList.add('correct');
                score++;
                document.getElementById('score-text').innerText = score;
                showPraise();
            } else {
                btn.classList.add('wrong');
                allBtns[qData.answer].classList.add('correct'); 
            }

            const blankedText = qData.q.replace('________', `<span class="${selectedIndex === qData.answer ? 'text-ws-norseGreen' : 'text-ws-spartanRed'} underline underline-offset-4">${qData.options[qData.answer]}</span>`);
            document.getElementById('q-text').innerHTML = `"${blankedText}"`;

            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < questions.length) {
                loadQuestion();
            } else {
                endQuiz();
            }
        }

        function endQuiz() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('flex');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('flex');
            
            const finalScoreEl = document.getElementById('final-score');
            finalScoreEl.innerText = score;
            if(score < 8) finalScoreEl.classList.add('text-ws-spartanRed');

            document.getElementById('progress-bar').style.width = '100%';
        }

        function updateProgress() {
            const progress = (currentQ / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function showPraise() {
            const toast = document.getElementById('praise-toast');
            toast.innerText = praises[Math.floor(Math.random() * praises.length)];
            toast.classList.remove('toast-anim');
            void toast.offsetWidth;
            toast.classList.add('toast-anim');
        }
    </script>
</body>
</html>
